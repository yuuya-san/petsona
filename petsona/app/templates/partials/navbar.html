<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>PetSona</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --lavender-main: #8b5cf6;
  --lavender-glow: rgba(139,92,246,.45);
  --lavender-soft: rgba(139,92,246,.18);
  --lavender-dark: #6c54d9;
  --gray-main: #1f2937;
  --white-soft: rgba(255,255,255,.8);
  --white-softer: rgba(255,255,255,.6);

  --glass-bg: rgba(255,255,255,.15);
  --glass-border: rgba(255,255,255,.25);
  --glass-shadow: rgba(139,92,246,.1);
}

/* ================= RESET ================= */
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  padding: 0;
  font-family: "Poppins", system-ui, sans-serif;
  background: linear-gradient(135deg, #f8fafc 0%, #ede9fe 100%);
  min-height: 100vh;
}

body {
  padding-top: 58px;
}

/* ================= NAVBAR ================= */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 58px !important;
  z-index: 1000;

  background: linear-gradient(
    135deg,
    rgba(139,92,246,.08),
    rgba(168,85,247,.05)
  );

  backdrop-filter: blur(25px) saturate(1.5);
  -webkit-backdrop-filter: blur(25px) saturate(1.5);

  border-bottom: 1px solid var(--glass-border);
  box-shadow:
    0 8px 32px var(--glass-shadow),
    0 0 1px rgba(139,92,246,.15),
    inset 0 1px 0 rgba(255,255,255,.4);

  animation: navEnter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes navEnter {
  from {
    opacity: 0;
    transform: translateY(-10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* ================= NAV CONTENT ================= */
.nav-container {
  max-width: 1600px;
  height: 100%;
  margin: 0 auto;
  padding: 0.5rem clamp(1rem, 4vw, 3.5rem) 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

/* ================= BRAND ================= */
.brand {
  display: flex;
  align-items: center;
  gap: .6rem;
  text-decoration: none;
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--gray-main);
  transition: all 0.3s ease;
}

.brand:hover {
  transform: translateY(-2px);
}

.brand i {
  color: #a855f7 !important;
  font-size: 1.25rem !important;
  filter: drop-shadow(0 0 8px var(--lavender-glow));
  transition: all 0.3s ease;
}

.navbar i,
.nav-links i {
  color: #a855f7 !important;
  font-size: 1.25rem !important;
}

.brand:hover i {
  transform: scale(1.1) rotate(-10deg);
}

/* ================= LINKS ================= */
.nav-links {
  list-style: none;
  display: flex;
  align-items: center;
  gap: 2rem;
  margin: 0;
  padding: 0;
}

.nav-links a {
  text-decoration: none;
  font-size: .85rem;
  font-weight: 500;
  color: #475569;
  position: relative;
  transition: all 0.3s ease;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--lavender-main), var(--lavender-dark));
  transition: width 0.3s ease;
  border-radius: 1px;
}

.nav-links a:hover {
  color: var(--lavender-main);
}

.nav-links a:hover::after {
  width: 100%;
}

.nav-links a.active {
  color: var(--lavender-main);
  font-weight: 600;
}

.nav-links a.active::after {
  width: 100%;
}

/* ================= LOGIN ================= */
.nav-auth a {
  padding: .5rem 1.4rem;
  border-radius: 999px;
  background: linear-gradient(
    135deg,
    rgba(139,92,246,.15),
    rgba(168,85,247,.1)
  );
  color: var(--lavender-main);
  font-weight: 600;
  border: 1.5px solid var(--glass-border);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  backdrop-filter: blur(10px);
  text-decoration: none;
  display: inline-block;
  box-shadow: 0 4px 15px rgba(139,92,246,.1);
  font-size: .85rem;
}

.nav-auth a:hover {
  background: linear-gradient(
    135deg,
    rgba(139,92,246,.25),
    rgba(168,85,247,.15)
  );
  transform: translateY(-3px);
  box-shadow: 0 8px 25px rgba(139,92,246,.2);
  border-color: rgba(139,92,246,.4);
}

/* ================= HAMBURGER ================= */
.nav-toggle {
  display: none;
  flex-direction: column;
  gap: 6px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px;
  border-radius: 12px;
  transition: all 0.3s ease;
}

.nav-toggle:hover {
  background: rgba(139,92,246,.1);
}

.nav-toggle span {
  width: 26px;
  height: 2.5px;
  background: #000000;
  border-radius: 2px;
  transition: all 0.3s ease;
}

.nav-toggle.active span:nth-child(1) {
  transform: rotate(45deg) translate(10px, 10px);
}

.nav-toggle.active span:nth-child(2) {
  opacity: 0;
}

.nav-toggle.active span:nth-child(3) {
  transform: rotate(-45deg) translate(7px, -7px);
}

/* ================= MOBILE ================= */
@media (max-width: 900px) {

  body { padding-top: 54px; }
  
  .navbar {
    height: 54px;
    background: linear-gradient(
      135deg,
      rgba(139,92,246,.12),
      rgba(168,85,247,.08)
    );
    backdrop-filter: blur(30px) saturate(1.6);
    -webkit-backdrop-filter: blur(30px) saturate(1.6);
    border-bottom: 1px solid rgba(255,255,255,.2);
    box-shadow: 
      0 12px 40px rgba(139,92,246,.15),
      0 0 1px rgba(139,92,246,.2),
      inset 0 1px 0 rgba(255,255,255,.3);
  }

  .brand {
    color: #f1f5f9;
    font-size: 1.2rem;
  }

  .brand i {
    color: #c4b5fd;
    filter: drop-shadow(0 0 10px rgba(139,92,246,.3));
  }

  .nav-toggle {
    display: flex;
  }

  .nav-toggle span {
    background: #000000;
  }

  .nav-links {
    position: fixed;
    top: calc(100% + 0px);
    left: 0;
    right: 0;
    width: 100%;
    flex-direction: column;
    padding: 1.2rem;
    display: none;
    gap: 0.8rem;

    background: rgba(55, 65, 81, 0.95);
    backdrop-filter: blur(35px) saturate(1.7);
    -webkit-backdrop-filter: blur(35px) saturate(1.7);
    border-top: 1px solid rgba(75, 85, 99, 0.5);
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    animation: slideDownMenu 0.4s ease-out;
  }

  @keyframes slideDownMenu {
    from {
      opacity: 0;
      transform: translateY(-10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .nav-links.active {
    display: flex;
  }

  .nav-links li {
    text-align: center;
    padding: .6rem 0;
  }

  .nav-links a {
    color: #e5e7eb;
    padding: 1rem 2rem;
    border-radius: 14px;
    display: block;
    transition: all 0.3s ease;
    margin: 0 0.5rem;
  }

  .nav-links a::after {
    display: none;
  }

  .nav-links a:hover {
    background: rgba(139,92,246,.3);
    color: #ffffff;
  }

  .nav-links a.active {
    background: rgba(139,92,246,.4);
    color: #c4b5fd;
    font-weight: 600;
  }

  .nav-auth {
    margin-top: .8rem;
    padding-top: .8rem;
    border-top: 1px solid #4b5563;
  }

  .nav-auth a {
    width: 100%;
    background: linear-gradient(
      135deg,
      rgba(139,92,246,.4),
      rgba(168,85,247,.3)
    );
    color: #ffffff;
    border-color: rgba(139,92,246,.5);
  }

  .nav-auth a:hover {
    background: linear-gradient(
      135deg,
      rgba(139,92,246,.5),
      rgba(168,85,247,.4)
    );
  }
}

/* BRAND IMAGE LOGO */
.brand {
  display: flex;
  align-items: center;
  gap: .8rem;
  text-decoration: none;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--gray-main);
}

.brand span:last-child {
  font-weight: 700;
  letter-spacing: .03em;
  background: linear-gradient(
    135deg,
    #8b5cf6,
    #6366f1
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.brand-logo {
  width: 45px;
  height: 45px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
}

.brand-logo img {
  width: 60px;
  height: 60px;
  object-fit: cover;
  display: block;
}

.brand:hover .brand-logo {
  transform: scale(1.05);
}

/* MOBILE & TABLET */
@media (max-width: 1024px) {
  .brand {
    color: #f1f5f9;
    font-size: 1.2rem;
  }

  .brand-logo {
    width: 45px;
    height: 45px;
    margin-right: 0%;
  }
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="nav-container">

    <a href="{{ url_for('auth.home') }}" class="brand">
      <span class="brand-logo">
        <img src="{{ url_for('static', filename='images/logo/petsona-logo.png') }}" alt="PetSona Logo">
      </span>
      <span>PetSona</span>
    </a>

    <button class="nav-toggle" aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="nav-links">
      <li><a href="{{ url_for('auth.home') }}" class="{% if request.endpoint == 'auth.home' %}active{% endif %}">Home</a></li>
      <li><a href="{{ url_for('auth.feature') }}" class="{% if request.endpoint == 'auth.feature' %}active{% endif %}">Features</a></li>
      <li><a href="{{ url_for('auth.about') }}" class="{% if request.endpoint == 'auth.about' %}active{% endif %}">About</a></li>
      <li><a href="{{ url_for('auth.contact') }}" class="{% if request.endpoint == 'auth.contact' %}active{% endif %}">Contact</a></li>
      <li class="nav-auth">
        <a href="{{ url_for('auth.login') }}">Login</a>
      </li>
    </ul>

  </div>
</nav>

<script>
const toggle = document.querySelector('.nav-toggle');
const links = document.querySelector('.nav-links');

toggle.addEventListener('click', () => {
  links.classList.toggle('active');
  toggle.classList.toggle('active');
});

// Close menu when clicking a link
document.querySelectorAll('.nav-links a').forEach(link => {
  link.addEventListener('click', () => {
    links.classList.remove('active');
    toggle.classList.remove('active');
  });
});
</script>

</body>
</html>
